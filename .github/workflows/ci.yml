name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install system dependencies (ffmpeg for video pipeline tests)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      - name: Create venv and install deps
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt pytest httpx

      - name: Run unit tests (fast feedback)
        run: |
          .venv/bin/python -m pytest tests/ --ignore=tests/test_smoke.py -q -m unit --tb=short

      - name: Lint with ruff
        run: |
          .venv/bin/pip install ruff
          .venv/bin/ruff check . --output-format=github

      - name: Check ruff format
        run: |
          .venv/bin/pip install ruff
          .venv/bin/ruff format --check .

      - name: Run full smoke suite
        run: |
          MISE_DATA_DIR=$(mktemp -d) \
          MISE_SECRET_KEY=test-secret \
          MISE_ADMIN_PASSWORD=test-pw \
          MISE_ENV_FILE=/nonexistent \
            .venv/bin/python -m pytest tests/test_smoke.py -q --tb=short

  # Fails the build when any pinned dependency has a published CVE (ADR 0065).
  # A separate job so an OSV/PyPI outage never blocks the test gate above; a
  # finding here means "bump the pin", not "the code broke".
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Audit pinned dependencies for known vulnerabilities
        run: |
          python -m pip install --quiet pip-audit
          pip-audit -r requirements.txt

  # Closes the "nobody noticed main was red for a week" gap: when the smoke gate
  # fails on a push to main, open (or refresh) an assigned tracking issue. Default
  # Actions failure emails go to the pushing actor (often an agent), not Kevin —
  # an in-repo issue is free, idempotent, and visible to every agent that lists issues.
  main-red-alert:
    needs: smoke
    if: ${{ always() && needs.smoke.result == 'failure' && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Open or refresh the "main is RED" issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          R: ${{ github.repository }}
        run: |
          url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          num=$(gh issue list --repo "$R" --search 'main is RED in:title' --state open --json number --jq '.[0].number')
          if [ -z "$num" ]; then
            gh issue create --repo "$R" --title "main is RED: CI failing" \
              --label ci-red --assignee Ayyitskevin \
              --body "The smoke gate failed on main @ ${{ github.sha }} — $url"
          else
            gh issue comment "$num" --repo "$R" --body "Still red @ ${{ github.sha }} — $url"
          fi
