name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancel a branch's older in-flight CI when a new commit is pushed to it — saves runner
# minutes across the high-churn agent branches. Never cancels main: every commit to main
# gets a complete, uninterrupted validation run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install system dependencies (ffmpeg for video pipeline tests)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      - name: Create venv and install deps
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt -r requirements-dev.txt

      - name: Run unit tests (fast feedback)
        run: |
          .venv/bin/python -m pytest tests/ -m unit --tb=short

      - name: Lint with ruff
        run: .venv/bin/ruff check . --output-format=github

      - name: Check ruff format
        run: .venv/bin/ruff format --check .

      # Runs EVERY test not marked `unit` — i.e. the whole end-to-end suite, not just
      # tests/test_smoke.py. The old target (test_smoke.py only) silently skipped ~223
      # unmarked/smoke tests in the other test_smoke_*.py files, so a chunk of the suite
      # never ran yet CI reported green. `-m unit` + `-m "not unit"` now partition all of
      # tests/ exactly once; --strict-markers (pytest.ini) makes a typo'd marker a hard error.
      - name: Run full smoke suite (everything not marked unit)
        run: |
          MISE_DATA_DIR=$(mktemp -d) \
          MISE_SECRET_KEY=test-secret \
          MISE_ADMIN_PASSWORD=test-pw \
          MISE_ENV_FILE=/nonexistent \
            .venv/bin/python -m pytest tests/ -m "not unit" --tb=short

  # (The CVE audit moved OUT of the per-push gate to .github/workflows/dependency-audit.yml —
  # a daily scheduled run that opens a tracking issue on a finding. Rationale: a transitive
  # CVE with a pending fix should not turn unrelated feature work red; Dependabot auto-merge
  # lands the bump, and the daily audit + this alarm keep it from going unnoticed.)

  # Closes the "nobody noticed main was red for a week" gap: when the smoke gate
  # fails on a push to main, open (or refresh) an assigned tracking issue. Default
  # Actions failure emails go to the pushing actor (often an agent), not Kevin —
  # an in-repo issue is free, idempotent, and visible to every agent that lists issues.
  main-red-alert:
    needs: smoke
    if: ${{ always() && needs.smoke.result == 'failure' && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Open or refresh the "main is RED" issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          R: ${{ github.repository }}
        run: |
          url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          num=$(gh issue list --repo "$R" --search 'main is RED in:title' --state open --json number --jq '.[0].number')
          if [ -z "$num" ]; then
            gh issue create --repo "$R" --title "main is RED: CI failing" \
              --label ci-red --assignee Ayyitskevin \
              --body "The smoke gate failed on main @ ${{ github.sha }} — $url"
          else
            gh issue comment "$num" --repo "$R" --body "Still red @ ${{ github.sha }} — $url"
          fi
