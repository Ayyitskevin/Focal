name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main, claude/ios-ai-activity ]

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install system dependencies (ffmpeg for video pipeline tests)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      - name: Create venv and install deps
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt pytest httpx

      - name: Run backend tests (core smoke isolated below)
        run: |
          .venv/bin/python -m pytest tests/ --ignore=tests/test_smoke.py -q --tb=short

      - name: Lint with ruff
        run: |
          .venv/bin/pip install ruff
          .venv/bin/ruff check . --output-format=github

      - name: Check ruff format
        run: |
          .venv/bin/pip install ruff
          .venv/bin/ruff format --check .

      - name: Run full smoke suite
        run: |
          MISE_DATA_DIR=$(mktemp -d) \
          MISE_SECRET_KEY=test-secret \
          MISE_ADMIN_PASSWORD=test-pw \
          MISE_ENV_FILE=/nonexistent \
            .venv/bin/python -m pytest tests/test_smoke.py -q --tb=short

  ios:
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Verify App Store toolchain
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild -version
          sdk_version="$(xcrun --sdk iphoneos --show-sdk-version)"
          xcode_major="$(xcodebuild -version | awk '$1 == "Xcode" { split($2, version, "."); print version[1] }')"
          sdk_major="${sdk_version%%.*}"
          echo "iOS SDK $sdk_version"
          if (( xcode_major < 26 || sdk_major < 26 )); then
            echo "Xcode 26 and the iOS 26 SDK are required for App Store submission." >&2
            exit 1
          fi

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: |
          xcodegen --version
          xcodegen generate

      - name: Run Swift 6 simulator tests
        working-directory: ios
        shell: bash
        run: |
          set -euo pipefail
          device_id="$(
            xcrun simctl list devices available -j |
              python3 -c 'import json, sys; devices = json.load(sys.stdin)["devices"]; print(next(device["udid"] for runtime in devices.values() for device in runtime if device.get("isAvailable", True) and device["name"].startswith("iPhone")))'
          )"
          xcodebuild test \
            -project Mise.xcodeproj \
            -scheme Mise \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=$device_id" \
            -derivedDataPath "$RUNNER_TEMP/MiseDerivedData" \
            CODE_SIGNING_ALLOWED=NO

  # Fails the build when any pinned dependency has a published CVE (ADR 0065).
  # A separate job so an OSV/PyPI outage never blocks the test gate above; a
  # finding here means "bump the pin", not "the code broke".
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Audit pinned dependencies for known vulnerabilities
        run: |
          python -m pip install --quiet pip-audit
          pip-audit -r requirements.txt
