name: Dependency audit

# The CVE audit lives HERE (scheduled) instead of in the per-push CI gate on purpose:
# a transitive CVE with a pending fix should NOT turn unrelated feature work red (that is
# what kept main red for a week and desensitizes a fleet to a red X). This runs daily and,
# on a real finding, opens/refreshes ONE tracking issue — Dependabot's auto-merge lands the
# actual bump. Exit-code branching means an OSV/PyPI outage (tool error) never opens a false
# issue; only "vulnerabilities found" (exit 1) does. Run on demand via the Actions tab too.

on:
  schedule:
    - cron: '17 11 * * *'   # ~06:17 ET daily, off the top-of-hour scheduler rush
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      R: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run pip-audit
        id: audit
        run: |
          python -m pip install --quiet pip-audit==2.10.1
          set +e
          pip-audit -r requirements.txt --format json --output audit.json
          echo "code=$?" >> "$GITHUB_OUTPUT"
          set -e

      - name: Open or refresh a tracking issue on real findings (exit 1)
        if: ${{ steps.audit.outputs.code == '1' }}
        run: |
          body=$(jq -r '.dependencies[] | select(.vulns | length > 0)
            | "- **\(.name) \(.version)**: " + ([.vulns[].id] | join(", "))' audit.json)
          title="dependency-audit: CVE in a pinned dependency"
          num=$(gh issue list --repo "$R" --search "$title in:title" --state open --json number --jq '.[0].number')
          if [ -z "$num" ]; then
            gh issue create --repo "$R" --title "$title" --label dependencies,security --assignee Ayyitskevin \
              --body $'pip-audit found CVEs in pinned dependencies. Dependabot should open a fix PR (it auto-merges once green); if none appears, bump the pin manually — see the #133 pillow pattern.\n\n'"$body"
          else
            gh issue comment "$num" --repo "$R" --body $'Still failing:\n\n'"$body"
          fi

      - name: Flag tool/network errors without opening a false issue
        if: ${{ steps.audit.outputs.code != '0' && steps.audit.outputs.code != '1' }}
        run: echo "::warning::pip-audit exited ${{ steps.audit.outputs.code }} (tool/network error, not a vuln finding) — no issue opened."
