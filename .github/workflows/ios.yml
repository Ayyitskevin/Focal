# iOS build + test gate (queue S1 / IOS-UPGRADE step 1).
#
# Kept as its own workflow rather than a job inside ci.yml on purpose: GitHub
# path filters apply at the workflow `on:` level, so adding `paths: ios/**` to
# ci.yml would stop the Python gate from running on non-iOS changes. A separate
# file lets the (slow, metered) macOS job run ONLY when ios/ changes, without
# touching the Python CI.
name: iOS

on:
  push:
    branches: [ main ]
    paths: [ 'ios/**', '.github/workflows/ios.yml' ]
  pull_request:
    branches: [ main ]
    paths: [ 'ios/**', '.github/workflows/ios.yml' ]

# macOS runner minutes are METERED — cancelling a branch's superseded in-flight build when
# a new commit lands is the biggest single minute-saver here. Never cancels main.
concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build-test:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain (Xcode + available iOS SDKs/simulators)
        run: |
          xcodebuild -version
          xcodebuild -showsdks | grep -i ios || true
          xcrun simctl list devices available | grep -i iphone || true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate the Xcode project
        working-directory: ios
        run: xcodegen generate

      # Resolve the destination by UDID from whatever iPhone simulator the runner
      # image actually ships, rather than hardcoding a device name/OS (which drifts
      # as the image's Xcode bumps — e.g. it has iPhone 17, not iPhone 16).
      - name: Select an available iPhone simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available --json \
            | jq -r 'first(.devices[][] | select(.name | startswith("iPhone")) | .udid)')
          if [ -z "$UDID" ] || [ "$UDID" = "null" ]; then
            echo "No available iPhone simulator on this runner:" >&2
            xcrun simctl list devices available >&2
            exit 1
          fi
          echo "Using simulator UDID $UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Build and run MiseTests
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild test \
            -project Mise.xcodeproj \
            -scheme Mise \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            CODE_SIGNING_ALLOWED=NO
