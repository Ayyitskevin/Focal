name: PR labeler

# Same-repo agent/dependabot PRs only, so plain `pull_request` (not pull_request_target) is
# safe — the explicit permissions block grants the write the action needs even on Dependabot's
# otherwise read-only token.
on: pull_request

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
