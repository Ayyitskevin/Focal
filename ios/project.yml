name: Mise

options:
  bundleIdPrefix: com.ayyitskevin
  minimumXcodeGenVersion: 2.45.4
  deploymentTarget:
    iOS: "17.0"
  groupSortPosition: top

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    CLANG_ENABLE_MODULES: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    DEVELOPMENT_LANGUAGE: en
  configs:
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG

targets:
  Mise:
    type: application
    platform: iOS
    sources:
      - path: Mise
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    info:
      path: Mise/Supporting/Info.plist
      properties:
        CFBundleDisplayName: Mise
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        NSFaceIDUsageDescription: "Use Face ID to unlock your Mise studio."
        MiseServerBaseURL: "$(MISE_SERVER_BASE_URL)"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ayyitskevin.mise
        PRODUCT_NAME: Mise
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    scheme:
      testTargets:
        - MiseTests
      gatherCoverageData: true

  MiseTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MiseTests
    dependencies:
      - target: Mise
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ayyitskevin.mise.tests
        GENERATE_INFOPLIST_FILE: YES
