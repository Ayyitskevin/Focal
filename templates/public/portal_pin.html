{% extends "base.html" %}
{% block title %}{{ p.client_name }} · {{ site_name }}{% endblock %}
{% block content %}
<main class="center-card">
  <h1>{{ p.company or p.client_name }}</h1>
  <p class="muted">Client portal</p>
  <form method="post" action="/portal/{{ p.slug }}/pin" class="pin-form">
    <input type="text" name="pin" inputmode="numeric" pattern="[0-9]{4}" maxlength="4"
           placeholder="4-digit PIN" autofocus required>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <button type="submit">Open portal</button>
  </form>
</main>
{% endblock %}
