{% extends "base.html" %}
{% block title %}Studio not found - Mise{% endblock %}
{% block content %}
<main style="min-height:100vh;display:grid;place-items:center;background:#faf7f0;color:#171717;font-family:ui-sans-serif,system-ui,sans-serif;padding:24px;">
  <section style="max-width:520px;border:1px solid #d8d4ca;border-radius:8px;background:#fffdf7;padding:28px;">
    <p style="margin:0 0 8px;color:#2f5c45;font-weight:800;text-transform:uppercase;font-size:.78rem;">Studio not found</p>
    <h1 style="margin:0 0 12px;font-size:2rem;letter-spacing:0;">No Mise studio exists for "{{ slug }}".</h1>
    <p style="color:#62645f;line-height:1.5;">Check the URL, or create a hosted studio with the flat $20/month plan.</p>
    <a href="{{ root_url }}" style="display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:0 16px;border-radius:8px;background:#2f5c45;color:white;text-decoration:none;font-weight:800;">See pricing</a>
  </section>
</main>
{% endblock %}
