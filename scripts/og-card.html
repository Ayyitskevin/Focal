<!doctype html>
<!-- Source for static/og-card.png — the 1200×630 link-preview card served as
     og:image on /, /pricing, and /demo. Regenerate after editing:
       node scripts/generate-og-card.mjs
     Uses the repo's own self-hosted fonts + marketing palette so shares match
     the landing page exactly. -->
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  @font-face {
    font-family: "Newsreader";
    src: url("../static/fonts/newsreader-latin.woff2") format("woff2");
    font-weight: 200 800;
  }
  @font-face {
    font-family: "Archivo";
    src: url("../static/fonts/archivo-latin.woff2") format("woff2");
    font-weight: 100 900;
  }
  * { margin: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    background: #faf7f0; color: #171717;
    font-family: "Archivo", sans-serif;
    display: flex; flex-direction: column; justify-content: space-between;
    padding: 64px 72px 56px;
    border: 14px solid #2f5c45;
  }
  .eyebrow {
    font-size: 22px; font-weight: 800; letter-spacing: .14em;
    text-transform: uppercase; color: #2f5c45;
  }
  h1 {
    font-family: "Newsreader", serif; font-weight: 500;
    font-size: 88px; line-height: 1.04; letter-spacing: -0.01em;
    max-width: 980px; margin-top: 18px;
  }
  h1 em { font-style: italic; color: #2f5c45; }
  .features { font-size: 27px; color: #5f625d; margin-top: 26px; letter-spacing: .01em; }
  .foot { display: flex; align-items: center; gap: 24px; }
  .price {
    background: #2f5c45; color: #fdfcf8; border-radius: 999px;
    font-size: 30px; font-weight: 800; padding: 16px 34px;
  }
  .trial { font-size: 26px; color: #5f625d; }
  .mark {
    margin-left: auto; font-family: "Newsreader", serif;
    font-size: 44px; font-weight: 600; color: #171717;
  }
  .mark b { color: #b98225; font-weight: 600; }
</style>
</head>
<body>
  <div>
    <div class="eyebrow">Pocket studio OS for photographers</div>
    <h1>Keep your whole studio <em>in focus.</em></h1>
    <div class="features">Inquiry &middot; Booking &middot; Galleries &middot; Contracts &middot; Payments &middot; Web + iOS</div>
  </div>
  <div class="foot">
    <span class="price">Self-hostable</span>
    <span class="trial">Private beta &middot; human-reviewed AI</span>
    <span class="mark">Focal<b>.</b></span>
  </div>
</body>
</html>
