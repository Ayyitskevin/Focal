[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP"]
ignore = [
  "E501",   # long lines OK for SQL strings, template paths, and descriptive text
  "W291",   # trailing whitespace (some legacy)
]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.lint.per-file-ignores]
"tests/test_smoke.py" = ["E401", "UP017", "E731", "F401", "F841", "UP012"]

# pytest configuration (markers, testpaths, addopts) lives in pytest.ini — the single
# source of truth. This block used to duplicate it here but silently lost precedence to
# pytest.ini AND lacked the marker registry, so removing it ends that two-config drift.
